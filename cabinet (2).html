<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — Танцевальные уроки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: #f0f0f0;
        }
        .header {
            background: #050505;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 2px solid #b22222;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #b22222, #6a0dad);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .nav-btn {
            background: linear-gradient(135deg, #b22222, #6a0dad);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .profile-section {
            background: #111;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 24px;
            color: #b22222;
            margin-bottom: 20px;
            text-align: left;
        }
        .cards-grid, .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card-item, .lesson-item {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .card-item:hover, .lesson-item:hover {
            transform: translateY(-3px);
            background: #2a0a2a;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #b22222, #6a0dad);
            border-radius: 4px;
        }
        .delete-card {
            background: #b22222;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 12px;
        }
        .empty-message {
            color: #999;
            text-align: center;
            padding: 40px;
        }
        footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #2a0a2a;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='index.html'">💃 Танцевальные уроки</div>
        <button class="nav-btn" onclick="window.location.href='index.html'">🏠 На главную</button>
    </div>

    <div class="container">
        <div class="profile-section">
            <h2 class="section-title">👤 Профиль</h2>
            <p id="userInfo" style="font-size: 18px;"></p>
        </div>

        <div class="profile-section">
            <h2 class="section-title">💳 Мои карты</h2>
            <div id="cardsList" class="cards-grid"></div>
        </div>

        <div class="profile-section">
            <h2 class="section-title">📚 Мои уроки</h2>
            <div id="lessonsList" class="lessons-grid"></div>
        </div>
    </div>

    <footer>© 2025 Танцевальные уроки. Танцуй с удовольствием!</footer>

    <script>
        const lessons = [
            { id: 1, name: "Hip-hop для начинающих", style: "Hip-hop", teacher: "Роман Дмитренко", videoFile: "lesson1" },
            { id: 2, name: "Jazz-funk", style: "Jazz-funk", teacher: "Александра Саук", videoFile: "lesson2" },
            { id: 3, name: "Crump энергия", style: "Crump", teacher: "Вадим Whiphead", videoFile: "lesson3" },
            { id: 4, name: "Contemporary душа", style: "Contemporary", teacher: "Анна Тарасенко", videoFile: "lesson4" },
            { id: 5, name: "Hip-hop продвинутый", style: "Hip-hop", teacher: "ZUB", videoFile: "lesson5" }
        ];

        let currentUser = { isLoggedIn: false, name: "", email: "", purchasedLessons: [], savedCards: [] };

        function loadData() {
            const saved = localStorage.getItem('danceUser');
            if (saved) {
                try { currentUser = JSON.parse(saved); } catch(e) {}
            }
            if (!currentUser.purchasedLessons) currentUser.purchasedLessons = [];
            if (!currentUser.savedCards) currentUser.savedCards = [];
            
            if (!currentUser.isLoggedIn) {
                document.getElementById('userInfo').innerHTML = '⚠️ Вы не вошли в аккаунт. <button class="nav-btn" onclick="window.location.href=\'index.html\'" style="margin-left:10px;">Войти</button>';
                document.getElementById('cardsList').innerHTML = '<div class="empty-message">Войдите в аккаунт для просмотра карт</div>';
                document.getElementById('lessonsList').innerHTML = '<div class="empty-message">Войдите в аккаунт для просмотра уроков</div>';
                return;
            }
            
            document.getElementById('userInfo').innerHTML = `👋 ${currentUser.name}<br>📧 ${currentUser.email}`;
            
            if (currentUser.savedCards.length === 0) {
                document.getElementById('cardsList').innerHTML = '<div class="empty-message">Нет сохранённых карт</div>';
            } else {
                document.getElementById('cardsList').innerHTML = currentUser.savedCards.map((card, idx) => `
                    <div class="card-item">
                        <div>💳 **** ${card.last4}</div>
                        <div>📅 ${card.expiry}</div>
                        <div>👤 ${card.name}</div>
                        <button class="delete-card" onclick="deleteCard(${idx})">Удалить</button>
                    </div>
                `).join('');
            }
            
            const purchasedLessonsData = currentUser.purchasedLessons;
            if (purchasedLessonsData.length === 0) {
                document.getElementById('lessonsList').innerHTML = '<div class="empty-message">У вас пока нет купленных уроков. Перейдите на <a href="index.html" style="color:#b22222;">главную страницу</a> и приобретите уроки!</div>';
            } else {
                document.getElementById('lessonsList').innerHTML = purchasedLessonsData.map(p => {
                    const lesson = lessons.find(l => l.id === p.lessonId);
                    if (!lesson) return '';
                    return `
                        <div class="lesson-item" onclick="window.location.href='watch.html?lesson=${lesson.id}'">
                            <div style="font-size:18px; font-weight:bold;">${lesson.name}</div>
                            <div style="color:#b22222; margin:5px 0;">👨‍🏫 ${lesson.teacher}</div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${p.progress || 0}%"></div></div>
                            <div>Прогресс: ${p.progress || 0}%</div>
                            <button class="nav-btn" style="margin-top:10px; width:100%;" onclick="event.stopPropagation(); window.location.href='watch.html?lesson=${lesson.id}'">▶️ Смотреть урок</button>
                        </div>
                    `;
                }).join('');
            }
        }
        
        function deleteCard(index) {
            currentUser.savedCards.splice(index, 1);
            localStorage.setItem('danceUser', JSON.stringify(currentUser));
            loadData();
        }
        
        loadData();
    </script>
</body>
</html>
